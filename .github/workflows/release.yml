name: Release

# Build installers for Linux + Windows and publish a GitHub Release when a
# version tag (e.g. v1.0.0) is pushed.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:   # allow manual runs for testing

permissions:
  contents: write      # needed to create the Release

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller edge-tts tkinterdnd2
      - name: Build zip (PyInstaller)
        run: python installer/build_release.py
      - name: Build .deb
        run: bash installer/linux/build_deb.sh
      - name: Build AppImage
        run: bash installer/linux/build_appimage.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            releases/*.zip
            releases/*.deb
            releases/*.AppImage
            releases/RELEASE_NOTES-*.md

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller edge-tts tkinterdnd2
      - name: Build .exe (PyInstaller)
        run: python -m PyInstaller installer/bookbuilder.spec --noconfirm --distpath dist --workpath build
      - name: Build installer (Inno Setup)
        run: |
          $v = python -c "from bookbuilder.version import __version__; print(__version__)"
          choco install innosetup --no-progress -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\windows\bookbuilder.iss" "/DMyAppVersion=$v"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: releases/*windows-setup.exe

  release:
    needs: [linux, windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/linux/*
            artifacts/windows/*
          generate_release_notes: true
